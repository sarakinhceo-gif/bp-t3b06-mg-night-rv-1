  <meta name="keywords" content="마곡 유흥, 마곡 유흥 후기, 마곡 유흥 정보, 마곡 업소, 유흥 후기 블로그">
  <link rel="canonical" href="https://t3b06-mg-night-rv-1.pages.dev">
  <meta property="og:title" content="마곡 유흥 후기 블로그 – 데이터 기반 업소 분석">
  <meta property="og:description" content="마곡 유흥 후기 전문 블로그. 실제 리뷰 데이터와 전문가 인사이트로 마곡 최고의 유흥 업소를 선정합니다.">
  <meta property="og:url" content="https://t3b06-mg-night-rv-1.pages.dev/blog">
  <meta property="og:type" content="article">
  <style>
    /* ===== brutalist reset & base ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
      background: #0a0a0f;
      color: #f0f0f0;
      line-height: 1.6;
    }
    a {
      color: #00ffc8;
      text-decoration: none;
    }
    a:hover {
      text-decoration: line-through;
    }
    img {
      max-width: 100%;
      display: block;
    }

    /* ===== layout ===== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ===== header & nav ===== */
    header {
      border-bottom: 3px solid #00ffc8;
      padding: 24px 0;
      background: #0a0a0f;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #00ffc8;
      text-transform: uppercase;
      border: 2px solid #00ffc8;
      padding: 4px 12px;
    }
    .logo a {
      color: inherit;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      font-weight: 600;
      font-size: 1.05rem;
      color: #f0f0f0;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active {
      border-bottom-color: #00ffc8;
      color: #00ffc8;
    }
    .hamburger-menu {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }
    .hamburger-menu span {
      display: block;
      width: 28px;
      height: 3px;
      background: #00ffc8;
      border-radius: 2px;
    }

    /* ===== hero / blog intro ===== */
    .hero-blog {
      padding: 80px 0 60px;
      border-bottom: 2px solid #222;
    }
    .hero-blog h1 {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1.2;
      color: #f0f0f0;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      max-width: 900px;
    }
    .hero-blog .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 24px;
      margin-top: 20px;
      font-size: 0.95rem;
      color: #999;
    }
    .hero-blog .meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .hero-blog .excerpt {
      margin-top: 28px;
      font-size: 1.2rem;
      color: #ccc;
      max-width: 800px;
      padding-left: 20px;
      border-left: 4px solid #00ffc8;
    }

    /* ===== blog article ===== */
    .blog-article {
      padding: 60px 0 80px;
    }
    .blog-article h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-top: 48px;
      margin-bottom: 16px;
      color: #00ffc8;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }
    .blog-article h2:first-child {
      margin-top: 0;
    }
    .blog-article h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-top: 32px;
      margin-bottom: 12px;
      color: #f0f0f0;
    }
    .blog-article p {
      margin-bottom: 20px;
      font-size: 1.05rem;
      color: #ddd;
    }
    .blog-article ul, .blog-article ol {
      margin: 16px 0 24px 24px;
      color: #ddd;
    }
    .blog-article li {
      margin-bottom: 8px;
    }
    .blog-article strong {
      color: #00ffc8;
    }
    .blog-article .data-box {
      background: #12121a;
      border: 2px solid #00ffc8;
      padding: 24px;
      margin: 32px 0;
      border-radius: 0;
    }
    .blog-article .data-box p {
      margin-bottom: 12px;
    }
    .blog-article .data-box .stat {
      font-size: 2.2rem;
      font-weight: 900;
      color: #00ffc8;
    }

    /* ===== faq section ===== */
    .faq-section {
      background: #0d0d14;
      padding: 60px 0;
      border-top: 3px solid #00ffc8;
    }
    .faq-section h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 40px;
      color: #f0f0f0;
      text-transform: uppercase;
    }
    .faq-item {
      border-bottom: 1px solid #333;
      padding: 20px 0;
    }
    .faq-item:first-of-type {
      border-top: 1px solid #333;
    }
    .faq-question {
      font-weight: 700;
      font-size: 1.1rem;
      color: #00ffc8;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .faq-question::after {
      content: '+';
      font-size: 1.6rem;
      color: #00ffc8;
      transition: transform 0.2s;
    }
    .faq-question.open::after {
      content: '−';
      transform: rotate(180deg);
    }
    .faq-answer {
      margin-top: 12px;
      color: #ccc;
      display: none;
      line-height: 1.7;
    }
    .faq-answer.open {
      display: block;
    }

    /* ===== footer ===== */
    footer {
      border-top: 2px solid #222;
      padding: 40px 0;
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }
    footer a {
      color: #00ffc8;
    }

    /* ===== responsive (768) ===== */
    @media (max-width: 768px) {
      .header-inner {
        flex-wrap: wrap;
      }
      .hamburger-menu {
        display: flex;
      }
      .nav-links {
        display: none;
        flex-direction: column;
        width: 100%;
        gap: 12px;
        padding-top: 20px;
        background: #0a0a0f;
        border-top: 2px solid #00ffc8;
      }
      .nav-links.open {
        display: flex;
      }
      .hero-blog h1 {
        font-size: 2rem;
      }
      .hero-blog .excerpt {
        font-size: 1rem;
        padding-left: 12px;
      }
      .blog-article h2 {
        font-size: 1.6rem;
      }
      .blog-article .data-box .stat {
        font-size: 1.6rem;
      }
      .faq
</body>
</html>
